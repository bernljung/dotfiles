# theme = "solarized_dark"
theme = "everforest_dark"

[keys.normal]
"å" = { d = "goto_prev_diag", D = "goto_first_diag", f = "goto_prev_function", t = "goto_prev_class", a = "goto_prev_parameter", c = "goto_prev_comment", T = "goto_prev_test", p = "goto_prev_paragraph", g = "goto_prev_change", G = "goto_first_change", space = "add_newline_above" }
"ä" = { d = "goto_next_diag", D = "goto_last_diag", f = "goto_next_function", t = "goto_next_class", a = "goto_next_parameter", c = "goto_next_comment", T = "goto_next_test", p = "goto_next_paragraph", g = "goto_next_change", G = "goto_last_change", space = "add_newline_below" }
esc = ["collapse_selection", "keep_primary_selection"]
C-r = ":reload-all"
C-g = [":new", ":insert-output lazygit", ":buffer-close!", ":redraw"]
"œ" = "expand_selection"
"ı" = "shrink_selection"
"π" = "select_prev_sibling"
"‘" = "select_next_sibling"

[editor]
line-number = "relative"
mouse = false
bufferline = "never"

[editor.soft-wrap]
enable = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
